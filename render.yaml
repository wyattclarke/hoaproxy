services:
  - type: web
    name: hoaproxy-app
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: standard
    autoDeploy: true
    healthCheckPath: /healthz
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: HOA_DOCS_ROOT
        value: /var/data/hoa_docs
      - key: HOA_DB_PATH
        value: /var/data/hoa_index.db
      - key: HOA_QDRANT_LOCAL_PATH
        value: /var/data/qdrant_local
      - key: QDRANT_URL
        value: ""
      - key: QDRANT_API_KEY
        value: ""
      - key: HOA_DISABLE_QDRANT
        value: "1"
      - key: HOA_ENABLE_DOCAI
        value: "1"
      - key: HOA_DOCAI_PROJECT_ID
        sync: false
      - key: HOA_DOCAI_LOCATION
        value: us
      - key: HOA_DOCAI_PROCESSOR_ID
        sync: false
      - key: HOA_DOCAI_ENDPOINT
        value: ""
      - key: GOOGLE_APPLICATION_CREDENTIALS
        value: /etc/secrets/gcp-service-account.json
      - key: PROXY_RETENTION_DAYS
        value: "90"
      - key: DOCUMENSO_API_URL
        value: "https://app.documenso.com"
      - key: DOCUMENSO_API_KEY
        sync: false
      - key: DOCUMENSO_WEBHOOK_SECRET
        sync: false
      - key: EMAIL_PROVIDER
        value: "stub"
      - key: EMAIL_FROM
        value: "noreply@hoaproxy.org"
      - key: RESEND_API_KEY
        sync: false
      - key: SMTP_HOST
        value: ""
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: ""
      - key: SMTP_PASSWORD
        sync: false
      # Phase 2 (scaling-proposal.md §Phase 2): when 1, /upload and
      # /admin/ingest-ready-gcs enqueue into pending_ingest instead of
      # running synchronously. The hoaware.ingest_worker process drains
      # the queue. Cutover: PATCH this single env-var (do NOT round-trip
      # the full env via PUT — see reference_render_api.md).
      - key: ASYNC_INGEST_ENABLED
        value: "0"
      # Worker process is co-located in this container (see
      # scripts/start_web_with_worker.sh). Set to 0 to fall back to
      # uvicorn-only during rollback. Render persistent disks aren't
      # share-able across services, so a single container running both
      # processes is the Phase 2 deployment shape; a separate
      # `type: worker` service is a Phase 4 follow-up after Neon Postgres.
      - key: INGEST_WORKER_ENABLED
        value: "1"
      - key: INGEST_WORKER_POLL_SEC
        value: "2"
      - key: INGEST_WORKER_HEARTBEAT_SEC
        value: "30"
      - key: INGEST_WORKER_MAX_ATTEMPTS
        value: "3"
    disk:
      name: hoaproxy-data
      mountPath: /var/data
      sizeGB: 200

  - type: cron
    name: hoaproxy-db-backup
    runtime: docker
    dockerfilePath: ./Dockerfile
    schedule: "0 10,22 * * *"
    envVars:
      - key: JWT_SECRET
        fromService:
          type: web
          name: hoaproxy-app
          envVarKey: JWT_SECRET
    dockerCommand: python scripts/trigger_backup.py
