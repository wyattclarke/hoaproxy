services:
  - type: web
    name: hoaproxy-app
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    autoDeploy: true
    healthCheckPath: /healthz
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: HOA_DOCS_ROOT
        value: /var/data/casnc_hoa_docs
      - key: HOA_DB_PATH
        value: /var/data/hoa_index.db
      - key: HOA_QDRANT_LOCAL_PATH
        value: /var/data/qdrant_local
      - key: QDRANT_URL
        value: ""
      - key: QDRANT_API_KEY
        value: ""
      - key: HOA_ENABLE_DOCAI
        value: "1"
      - key: HOA_ENABLE_OCR
        value: "0"
      - key: HOA_DOCAI_PROJECT_ID
        sync: false
      - key: HOA_DOCAI_LOCATION
        value: us
      - key: HOA_DOCAI_PROCESSOR_ID
        sync: false
      - key: HOA_DOCAI_ENDPOINT
        value: ""
      - key: GOOGLE_APPLICATION_CREDENTIALS
        value: /etc/secrets/gcp-service-account.json
      - key: PROXY_RETENTION_DAYS
        value: "90"
      - key: DOCUMENSO_API_URL
        value: "https://app.documenso.com"
      - key: DOCUMENSO_API_KEY
        sync: false
      - key: DOCUMENSO_WEBHOOK_SECRET
        sync: false
      - key: EMAIL_PROVIDER
        value: "stub"
      - key: EMAIL_FROM
        value: "noreply@hoaproxy.org"
      - key: RESEND_API_KEY
        sync: false
      - key: SMTP_HOST
        value: ""
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: ""
      - key: SMTP_PASSWORD
        sync: false
    disk:
      name: hoaproxy-data
      mountPath: /var/data
      sizeGB: 20
