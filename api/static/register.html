<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HOAware | Register</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Space+Grotesk:wght@600;700&display=swap");

      :root {
        --bg: #eef5ff; --ink: #12233a; --muted: #587091; --line: #d3e0f4;
        --accent: #1662f3; --accent-strong: #0d49be; --ok: #177c45; --danger: #b62525;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0; min-height: 100vh;
        font-family: "Manrope", "Segoe UI", sans-serif; color: var(--ink);
        background: radial-gradient(95rem 60rem at 8% -22%, rgba(20,98,243,0.2), transparent 60%),
                    radial-gradient(70rem 45rem at 95% -15%, rgba(36,189,156,0.14), transparent 56%),
                    linear-gradient(180deg, #f8fbff 0%, var(--bg) 54%, #edf3ff 100%);
      }

      .shell { width: min(480px, 94vw); margin: 60px auto; }

      .card {
        border: 1px solid var(--line); border-radius: 18px;
        background: rgba(255,255,255,0.94); box-shadow: 0 10px 32px rgba(16,40,73,0.09);
        padding: 28px;
      }

      .brand { display: inline-flex; align-items: baseline; gap: 0.12em;
        font-family: "Space Grotesk", "Manrope", sans-serif;
        font-size: 1.8rem; font-weight: 700; margin: 0 0 6px; }
      .brand-hoa { color: #0f2f6d; } .brand-aware { color: #1a66ff; }

      h2 { margin: 0 0 16px; font-family: "Space Grotesk", "Manrope", sans-serif; font-size: 1.2rem; }
      label { display: block; margin: 12px 0 4px; font-size: 0.88rem; font-weight: 700; }
      input {
        width: 100%; border: 1px solid var(--line); border-radius: 10px;
        padding: 10px 12px; font: inherit; background: #fff;
      }
      input:focus { outline: none; border-color: #8cb4ff; box-shadow: 0 0 0 4px rgba(22,98,243,0.15); }

      .btn {
        display: inline-flex; align-items: center; justify-content: center;
        border-radius: 10px; border: 1px solid var(--accent);
        background: linear-gradient(180deg, var(--accent), var(--accent-strong));
        color: #fff; padding: 10px 18px; font-family: inherit;
        font-size: 0.95rem; font-weight: 800; cursor: pointer; width: 100%; margin-top: 16px;
      }
      .btn:disabled { opacity: 0.55; cursor: not-allowed; }

      .status { margin-top: 10px; min-height: 1.2em; font-size: 0.9rem; color: var(--muted); }
      .status.ok { color: var(--ok); } .status.error { color: var(--danger); }
      .link { color: var(--accent); font-weight: 700; text-decoration: none; }
      .link:hover { text-decoration: underline; }
      .footer { margin-top: 14px; text-align: center; font-size: 0.9rem; color: var(--muted); }
    </style>
  </head>
  <body>
    <main class="shell">
      <div class="card">
        <a href="/" style="text-decoration:none"><div class="brand"><span class="brand-hoa">HOA</span><span class="brand-aware">ware</span></div></a>
        <h2>Create an Account</h2>
        <label for="displayName">Display Name</label>
        <input id="displayName" placeholder="Your name" autocomplete="name" />
        <label for="email">Email</label>
        <input id="email" type="email" placeholder="you@example.com" autocomplete="email" />
        <label for="password">Password</label>
        <input id="password" type="password" placeholder="At least 8 characters" autocomplete="new-password" />
        <button class="btn" id="registerBtn" type="button">Create Account</button>
        <div id="status" class="status"></div>
        <div class="footer">Already have an account? <a class="link" href="/login">Log in</a></div>
      </div>
    </main>
    <script src="/static/js/auth.js"></script>
    <script>
      const displayName = document.getElementById("displayName");
      const emailInput = document.getElementById("email");
      const passwordInput = document.getElementById("password");
      const registerBtn = document.getElementById("registerBtn");
      const status = document.getElementById("status");

      if (Auth.isLoggedIn()) window.location.href = "/dashboard";

      async function doRegister() {
        const email = emailInput.value.trim();
        const password = passwordInput.value;
        const name = displayName.value.trim();
        if (!email || !password) {
          status.className = "status error";
          status.textContent = "Email and password are required.";
          return;
        }
        if (password.length < 8) {
          status.className = "status error";
          status.textContent = "Password must be at least 8 characters.";
          return;
        }
        registerBtn.disabled = true;
        status.className = "status";
        status.textContent = "Creating account...";
        try {
          const data = await Auth.fetchJson("/auth/register", {
            method: "POST",
            body: JSON.stringify({ email, password, display_name: name || null }),
          });
          Auth.setToken(data.token);
          const me = await Auth.fetchJson("/auth/me");
          Auth.setCachedUser(me);
          window.location.href = "/dashboard";
        } catch (err) {
          status.className = "status error";
          status.textContent = err.message || "Registration failed.";
        } finally {
          registerBtn.disabled = false;
        }
      }

      registerBtn.addEventListener("click", doRegister);
      passwordInput.addEventListener("keydown", (e) => { if (e.key === "Enter") doRegister(); });
    </script>
  </body>
</html>
