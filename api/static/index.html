<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HOAware</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Space+Grotesk:wght@600;700&display=swap");

      :root {
        --bg: #eef5ff;
        --ink: #12233a;
        --muted: #587091;
        --line: #d3e0f4;
        --panel: #fff;
        --accent: #1662f3;
        --accent-strong: #0d49be;
        --ok: #177c45;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Manrope", "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(95rem 60rem at 8% -22%, rgba(20, 98, 243, 0.2), transparent 60%),
          radial-gradient(70rem 45rem at 95% -15%, rgba(36, 189, 156, 0.14), transparent 56%),
          linear-gradient(180deg, #f8fbff 0%, var(--bg) 54%, #edf3ff 100%);
      }

      .shell {
        width: min(1240px, 94vw);
        margin: 28px auto 56px;
      }

      .hero {
        border: 1px solid #c9dbfa;
        border-radius: 22px;
        background: linear-gradient(118deg, rgba(255, 255, 255, 0.95) 0%, rgba(227, 240, 255, 0.95) 100%);
        box-shadow: 0 16px 44px rgba(17, 40, 74, 0.14);
        padding: 22px;
      }

      .top-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
      }

      .brand {
        display: inline-flex;
        align-items: baseline;
        gap: 0.12em;
        font-family: "Space Grotesk", "Manrope", sans-serif;
        font-size: clamp(1.7rem, 3.5vw, 2.5rem);
        font-weight: 700;
        margin: 0;
      }

      .brand-wrap {
        margin: 0;
      }

      .brand-link {
        color: inherit;
        text-decoration: none;
      }

      .brand-link:hover {
        text-decoration: none;
      }

      .brand-mark {
        position: relative;
        width: 0.9em;
        height: 0.9em;
        margin-right: 0.12em;
        transform: translateY(0.03em);
      }

      .brand-mark::before {
        content: "";
        position: absolute;
        left: 0.08em;
        top: 0.08em;
        width: 0.72em;
        height: 0.52em;
        border-radius: 0.08em;
        background: linear-gradient(180deg, #cfe0ff, #a9c5f6);
        border: 1px solid #89aee8;
      }

      .brand-mark::after {
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        width: 0;
        height: 0;
        border-left: 0.44em solid transparent;
        border-right: 0.44em solid transparent;
        border-bottom: 0.34em solid #1e5fcf;
      }

      .brand-hoa {
        color: #0f2f6d;
        letter-spacing: 0.03em;
      }

      .brand-aware {
        color: #1a66ff;
      }

      .actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 10px;
        border: 1px solid var(--line);
        background: #fff;
        color: #1b355c;
        padding: 10px 14px;
        font-family: "Manrope", "Segoe UI", sans-serif;
        font-size: 0.92rem;
        font-weight: 800;
        line-height: 1.15;
        text-decoration: none;
        cursor: pointer;
        appearance: none;
      }

      .btn:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

      .btn.primary {
        border-color: var(--accent);
        background: linear-gradient(180deg, var(--accent), var(--accent-strong));
        color: #fff;
      }

      .subtitle {
        margin: 8px 0 0;
        color: var(--muted);
        font-size: 1rem;
      }

      .search-row {
        margin-top: 14px;
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
      }

      .search-row input {
        border: 1px solid var(--line);
        border-radius: 11px;
        background: #fff;
        padding: 12px;
        font: inherit;
      }

      .search-row input:focus {
        outline: none;
        border-color: #8cb4ff;
        box-shadow: 0 0 0 4px rgba(22, 98, 243, 0.15);
      }

      .status {
        margin-top: 9px;
        min-height: 1.2em;
        color: var(--muted);
        font-size: 0.9rem;
      }

      .status.ok {
        color: var(--ok);
      }

      .grid {
        margin-top: 16px;
        display: grid;
        gap: 14px;
        grid-template-columns: minmax(420px, 1.25fr) minmax(320px, 1fr);
      }

      .card {
        border: 1px solid var(--line);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.94);
        box-shadow: 0 10px 32px rgba(16, 40, 73, 0.09);
        padding: 14px;
      }

      h2 {
        margin: 0 0 10px;
        font-family: "Space Grotesk", "Manrope", sans-serif;
        font-size: 1.08rem;
      }

      #map {
        height: 560px;
        border: 1px solid var(--line);
        border-radius: 12px;
      }

      .meta {
        color: var(--muted);
        font-size: 0.86rem;
      }

      .list {
        max-height: 620px;
        overflow: auto;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: #fff;
      }

      .hoa-card {
        padding: 12px;
        border-bottom: 1px solid #ebf1fb;
      }

      .hoa-card:last-child {
        border-bottom: 0;
      }

      .hoa-head {
        display: flex;
        justify-content: space-between;
        gap: 8px;
      }

      .hoa-name {
        font-weight: 800;
        font-size: 0.98rem;
      }

      .hoa-name-link {
        color: #0f4fcd;
        text-decoration: none;
      }

      .hoa-name-link:hover {
        text-decoration: underline;
      }

      .pill {
        display: inline-block;
        margin-right: 6px;
        margin-top: 6px;
        font-size: 0.75rem;
        border-radius: 999px;
        padding: 3px 8px;
        background: #ebf3ff;
        border: 1px solid #cae0ff;
        color: #244a7f;
      }

      .hoa-link {
        display: inline-block;
        margin-top: 8px;
        color: #0f4fcd;
        font-weight: 800;
        text-decoration: none;
      }

      .hoa-link:hover {
        text-decoration: underline;
      }

      @media (max-width: 980px) {
        .grid {
          grid-template-columns: 1fr;
        }

        #map {
          height: 360px;
        }
      }

      @media (max-width: 680px) {
        .search-row {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <div class="top-row">
          <h1 class="brand-wrap">
            <a class="brand brand-link" href="/"><span class="brand-mark" aria-hidden="true"></span><span class="brand-hoa">HOA</span><span class="brand-aware">ware</span></a>
          </h1>
          <div class="actions">
            <a class="btn primary" href="/add-hoa">Add Your HOA</a>
            <a class="btn" href="/about">About</a>
          </div>
        </div>
        <p class="subtitle">Civil society for your neighborhood. Make HOA life better, together.</p>
        <div class="search-row">
          <input id="searchInput" placeholder="Search by HOA name, city, or state" />
          <div class="meta" id="countMeta"></div>
        </div>
        <div id="homeStatus" class="status"></div>
      </section>

      <section class="grid">
        <article class="card">
          <h2>HOA Map</h2>
          <div id="map"></div>
        </article>

        <article class="card">
          <h2>HOA Directory</h2>
          <div class="list" id="hoaList"></div>
        </article>
      </section>
    </main>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script>
      const state = {
        summaries: [],
        filtered: [],
        markers: new Map(),
        map: null,
        markerLayer: null,
      };

      const searchInput = document.getElementById("searchInput");
      const countMeta = document.getElementById("countMeta");
      const homeStatus = document.getElementById("homeStatus");
      const hoaList = document.getElementById("hoaList");

      function setStatus(message, kind = "") {
        homeStatus.className = `status ${kind}`.trim();
        homeStatus.textContent = message || "";
      }

      function escapeHtml(text) {
        return String(text)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;");
      }

      function slugify(name) {
        return String(name || "")
          .trim()
          .toLowerCase()
          .replace(/\s+/g, "_")
          .replace(/[^a-z0-9_-]/g, "");
      }

      function profileHref(hoaName) {
        const slug = slugify(hoaName).replaceAll("_", "-");
        return `/hoa/${encodeURIComponent(slug)}`;
      }

      async function fetchJson(path, options = {}) {
        const res = await fetch(path, options);
        if (!res.ok) {
          let detail = `${res.status} ${res.statusText}`;
          try {
            const body = await res.json();
            if (body.detail) detail = body.detail;
          } catch (_) {}
          throw new Error(detail);
        }
        return res.json();
      }

      function initMap() {
        if (!window.L) {
          setStatus("Map library failed to load.", "error");
          return;
        }
        if (state.map) return;

        state.map = L.map("map", { zoomControl: true }).setView([35.78, -78.64], 7);
        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
          maxZoom: 19,
          attribution: "&copy; OpenStreetMap contributors",
        }).addTo(state.map);

        state.markerLayer = L.layerGroup().addTo(state.map);
      }

      function locationText(item) {
        return [item.city, item.state].filter(Boolean).join(", ") || "Location not mapped yet";
      }

      function renderList() {
        if (!state.filtered.length) {
          hoaList.innerHTML = '<div class="hoa-card">No matching HOAs.</div>';
          countMeta.textContent = "0 results";
          return;
        }

        hoaList.innerHTML = state.filtered
          .map((item) => {
            const mapped = item.latitude != null && item.longitude != null;
            return (
              `<div class="hoa-card">` +
              `<div class="hoa-head"><a class="hoa-name hoa-name-link" href="${profileHref(item.hoa)}">${escapeHtml(item.hoa)}</a><div class="meta">${mapped ? "Mapped" : "Unmapped"}</div></div>` +
              `<div class="meta">${escapeHtml(locationText(item))}</div>` +
              `<span class="pill">${item.doc_count} docs</span>` +
              `<span class="pill">${item.chunk_count} chunks</span>` +
              (item.website_url
                ? `<div class="meta" style="margin-top:6px"><a class="hoa-link" style="margin-top:0" href="${escapeHtml(item.website_url)}" target="_blank" rel="noopener noreferrer">Visit HOA website</a></div>`
                : "") +
              `</div>`
            );
          })
          .join("");

        countMeta.textContent = `${state.filtered.length} result${state.filtered.length === 1 ? "" : "s"}`;
      }

      function renderMarkers() {
        if (!state.map || !state.markerLayer) return;
        state.markerLayer.clearLayers();
        state.markers.clear();

        const bounds = [];
        for (const item of state.filtered) {
          if (item.latitude == null || item.longitude == null) continue;
          const marker = L.marker([item.latitude, item.longitude]).addTo(state.markerLayer);
          marker.bindPopup(
            `<a class="hoa-name-link" href="${profileHref(item.hoa)}"><strong>${escapeHtml(item.hoa)}</strong></a><br>` +
              `<span class="meta">${escapeHtml(locationText(item))}</span><br>` +
              `${item.doc_count} docs`
          );
          state.markers.set(item.hoa, marker);
          bounds.push([item.latitude, item.longitude]);
        }

        if (bounds.length) {
          state.map.fitBounds(bounds, { padding: [30, 30], maxZoom: 12 });
        } else {
          state.map.setView([35.78, -78.64], 7);
        }
      }

      function applyFilter() {
        const q = searchInput.value.trim().toLowerCase();
        if (!q) {
          state.filtered = [...state.summaries];
        } else {
          state.filtered = state.summaries.filter((item) => {
            const haystack = `${item.hoa} ${item.city || ""} ${item.state || ""} ${item.website_url || ""}`.toLowerCase();
            return haystack.includes(q);
          });
        }
        renderList();
        renderMarkers();
      }

      async function loadSummaries() {
        setStatus("Loading HOA discovery data...");
        try {
          const rows = await fetchJson("/hoas/summary");
          state.summaries = rows;
          state.filtered = [...rows];
          applyFilter();
          setStatus(`Loaded ${rows.length} HOA profiles.`, "ok");
        } catch (err) {
          setStatus(String(err.message || err), "error");
        }
      }

      searchInput.addEventListener("input", applyFilter);

      initMap();
      loadSummaries();
    </script>
  </body>
</html>
