<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HOAproxy | Reset Password</title>
    <link rel="stylesheet" href="/static/css/mobile.css" />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Space+Grotesk:wght@600;700&display=swap");
      :root { --bg: #eef5ff; --ink: #12233a; --muted: #587091; --line: #d3e0f4; --accent: #1662f3; --accent-strong: #0d49be; --ok: #177c45; --danger: #b62525; }
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; font-family: "Manrope", "Segoe UI", sans-serif; color: var(--ink);
        background: radial-gradient(95rem 60rem at 8% -22%, rgba(20,98,243,0.2), transparent 60%),
                    radial-gradient(70rem 45rem at 95% -15%, rgba(36,189,156,0.14), transparent 56%),
                    linear-gradient(180deg, #f8fbff 0%, var(--bg) 54%, #edf3ff 100%); }
      .shell { width: min(480px, 94vw); margin: 60px auto; }
      .card { border: 1px solid var(--line); border-radius: 18px; background: rgba(255,255,255,0.94); box-shadow: 0 10px 32px rgba(16,40,73,0.09); padding: 28px; }
      .brand { display: inline-flex; align-items: baseline; gap: 0.12em; font-family: "Space Grotesk", sans-serif; font-size: 1.8rem; font-weight: 700; margin: 0 0 6px; }
      .brand-hoa { color: #0f2f6d; } .brand-proxy { color: #1a66ff; }
      h2 { margin: 0 0 16px; font-family: "Space Grotesk", sans-serif; font-size: 1.2rem; }
      label { display: block; margin: 12px 0 4px; font-size: 0.88rem; font-weight: 700; }
      input { width: 100%; border: 1px solid var(--line); border-radius: 10px; padding: 10px 12px; font: inherit; background: #fff; }
      input:focus { outline: none; border-color: #8cb4ff; box-shadow: 0 0 0 4px rgba(22,98,243,0.15); }
      .btn { display: inline-flex; align-items: center; justify-content: center; border-radius: 10px; border: 1px solid var(--accent); background: linear-gradient(180deg, var(--accent), var(--accent-strong)); color: #fff; padding: 10px 18px; font-family: inherit; font-size: 0.95rem; font-weight: 800; cursor: pointer; width: 100%; margin-top: 16px; }
      .btn:disabled { opacity: 0.55; cursor: not-allowed; }
      .status { margin-top: 10px; min-height: 1.2em; font-size: 0.9rem; color: var(--muted); }
      .status.ok { color: var(--ok); } .status.error { color: var(--danger); }
      .link { color: var(--accent); font-weight: 700; text-decoration: none; }
      .link:hover { text-decoration: underline; }
      .footer { margin-top: 14px; text-align: center; font-size: 0.9rem; color: var(--muted); }
    </style>
  </head>
  <body>
    <main class="shell">
      <div class="card">
        <a href="/" style="text-decoration:none"><div class="brand"><span class="brand-hoa">HOA</span><span class="brand-proxy">proxy</span></div></a>
        <h2>Set a new password</h2>
        <label for="password">New Password</label>
        <div style="position:relative">
          <input id="password" type="password" placeholder="At least 8 characters" autocomplete="new-password" style="padding-right:60px" />
          <button type="button" id="togglePassword" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:transparent;border:none;cursor:pointer;font-size:0.82rem;color:var(--muted);font-family:inherit;padding:4px 6px;">Show</button>
        </div>
        <label for="confirm">Confirm Password</label>
        <input id="confirm" type="password" placeholder="Repeat password" autocomplete="new-password" />
        <button class="btn" id="submitBtn" type="button">Reset Password</button>
        <div id="status" class="status"></div>
        <div class="footer"><a class="link" href="/login">Back to login</a></div>
      </div>
    </main>
    <script src="/static/js/auth.js"></script>
    <script>
      const passwordInput = document.getElementById("password");
      const confirmInput = document.getElementById("confirm");
      const submitBtn = document.getElementById("submitBtn");
      const status = document.getElementById("status");

      const params = new URLSearchParams(window.location.search);
      const token = params.get("token");

      if (!token) {
        status.className = "status error";
        status.textContent = "Invalid reset link. Please request a new one.";
        submitBtn.disabled = true;
      }

      document.getElementById("togglePassword").addEventListener("click", function() {
        const isPassword = passwordInput.type === "password";
        passwordInput.type = isPassword ? "text" : "password";
        this.textContent = isPassword ? "Hide" : "Show";
      });

      async function doReset() {
        const password = passwordInput.value;
        const confirm = confirmInput.value;
        if (password.length < 8) {
          status.className = "status error";
          status.textContent = "Password must be at least 8 characters.";
          return;
        }
        if (password !== confirm) {
          status.className = "status error";
          status.textContent = "Passwords do not match.";
          return;
        }
        submitBtn.disabled = true;
        status.className = "status";
        status.textContent = "Updating password...";
        try {
          const resp = await fetch("/auth/reset-password", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ token, password }),
          });
          if (resp.ok) {
            status.className = "status ok";
            status.textContent = "Password updated! Redirecting to login...";
            setTimeout(() => { window.location.href = "/login"; }, 2000);
          } else {
            const body = await resp.json().catch(() => ({}));
            status.className = "status error";
            status.textContent = body.detail || "Reset failed. The link may have expired.";
            submitBtn.disabled = false;
          }
        } catch (err) {
          status.className = "status error";
          status.textContent = "Network error. Please try again.";
          submitBtn.disabled = false;
        }
      }

      submitBtn.addEventListener("click", doReset);
      confirmInput.addEventListener("keydown", (e) => { if (e.key === "Enter") doReset(); });
    </script>
  </body>
</html>
