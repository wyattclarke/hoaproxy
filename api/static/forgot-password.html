<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="ga-measurement-id" content="G-BV7JXG4JDE" />
    <script src="/static/js/analytics.js"></script>
    <link rel="icon" href="/favicon.ico" sizes="48x48">
    <link rel="icon" href="/static/favicon-48x48.png" type="image/png" sizes="48x48">
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
    <title>HOAproxy | Forgot Password</title>
    <link rel="stylesheet" href="/static/css/mobile.css" />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Space+Grotesk:wght@600;700&display=swap");
      :root { --bg: #eef5ff; --ink: #12233a; --muted: #587091; --line: #d3e0f4; --accent: #1662f3; --accent-strong: #0d49be; --ok: #177c45; --danger: #b62525; }
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; font-family: "Manrope", "Segoe UI", sans-serif; color: var(--ink);
        background: radial-gradient(95rem 60rem at 8% -22%, rgba(20,98,243,0.2), transparent 60%),
                    radial-gradient(70rem 45rem at 95% -15%, rgba(36,189,156,0.14), transparent 56%),
                    linear-gradient(180deg, #f8fbff 0%, var(--bg) 54%, #edf3ff 100%); }
      .shell { width: min(480px, 94vw); margin: 60px auto; }
      .card { border: 1px solid var(--line); border-radius: 18px; background: rgba(255,255,255,0.94); box-shadow: 0 10px 32px rgba(16,40,73,0.09); padding: 28px; }
      .brand { display: inline-flex; align-items: baseline; gap: 0.12em; font-family: "Space Grotesk", sans-serif; font-size: 1.8rem; font-weight: 700; margin: 0 0 6px; }
      .brand-hoa { color: #0f2f6d; } .brand-proxy { color: #1a66ff; }
      h2 { margin: 0 0 8px; font-family: "Space Grotesk", sans-serif; font-size: 1.2rem; }
      p { color: var(--muted); margin: 0 0 16px; line-height: 1.6; font-size: 0.9rem; }
      label { display: block; margin: 12px 0 4px; font-size: 0.88rem; font-weight: 700; }
      input { width: 100%; border: 1px solid var(--line); border-radius: 10px; padding: 10px 12px; font: inherit; background: #fff; }
      input:focus { outline: none; border-color: #8cb4ff; box-shadow: 0 0 0 4px rgba(22,98,243,0.15); }
      .btn { display: inline-flex; align-items: center; justify-content: center; border-radius: 10px; border: 1px solid var(--accent); background: linear-gradient(180deg, var(--accent), var(--accent-strong)); color: #fff; padding: 10px 18px; font-family: inherit; font-size: 0.95rem; font-weight: 800; cursor: pointer; width: 100%; margin-top: 16px; }
      .btn:disabled { opacity: 0.55; cursor: not-allowed; }
      .status { margin-top: 10px; min-height: 1.2em; font-size: 0.9rem; color: var(--muted); }
      .status.ok { color: var(--ok); } .status.error { color: var(--danger); }
      .link { color: var(--accent); font-weight: 700; text-decoration: none; }
      .link:hover { text-decoration: underline; }
      .footer { margin-top: 14px; text-align: center; font-size: 0.9rem; color: var(--muted); }
    </style>
  </head>
  <body>
    <main class="shell">
      <div class="card">
        <a href="/" style="text-decoration:none"><div class="brand"><span class="brand-hoa">HOA</span><span class="brand-proxy">proxy</span></div></a>
        <h2>Forgot your password?</h2>
        <p>Enter your email address and we'll send you a link to reset your password.</p>
        <label for="email" class="req">Email</label>
        <input id="email" type="email" placeholder="you@example.com" autocomplete="email" />
        <button class="btn" id="submitBtn" type="button">Send Reset Link</button>
        <div id="status" class="status"></div>
        <div class="footer"><a class="link" href="/login">Back to login</a></div>
      </div>
    </main>
    <script src="/static/js/auth.js"></script>
    <script>
      const emailInput = document.getElementById("email");
      const submitBtn = document.getElementById("submitBtn");
      const status = document.getElementById("status");

      async function doSubmit() {
        const email = emailInput.value.trim();
        if (!email) {
          status.className = "status error";
          status.textContent = "Please enter your email address.";
          return;
        }
        submitBtn.disabled = true;
        status.className = "status";
        status.textContent = "Sending...";
        try {
          await fetch("/auth/forgot-password", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email }),
          });
          // Always show success to avoid user enumeration
          status.className = "status ok";
          status.textContent = "If that email is registered, you'll receive a reset link shortly.";
          emailInput.disabled = true;
          submitBtn.disabled = true;
        } catch (err) {
          status.className = "status error";
          status.textContent = "Network error. Please try again.";
          submitBtn.disabled = false;
        }
      }

      submitBtn.addEventListener("click", doSubmit);
      emailInput.addEventListener("keydown", (e) => { if (e.key === "Enter") doSubmit(); });
    </script>
  </body>
</html>
