<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="ga-measurement-id" content="G-BV7JXG4JDE" />
    <script src="/static/js/analytics.js"></script>
    <link rel="icon" href="/favicon.ico" sizes="32x32">
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
    <title>HOAproxy | Verify Proxy Signature</title>
    <link rel="stylesheet" href="/static/css/mobile.css" />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Space+Grotesk:wght@600;700&display=swap");
      :root { --bg: #eef5ff; --ink: #12233a; --muted: #587091; --line: #d3e0f4; --accent: #1662f3; --ok: #177c45; --danger: #b62525; }
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; font-family: "Manrope", sans-serif; color: var(--ink);
        background: radial-gradient(95rem 60rem at 8% -22%, rgba(20,98,243,0.2), transparent 60%),
                    linear-gradient(180deg, #f8fbff 0%, var(--bg) 54%, #edf3ff 100%); }
      .shell { width: min(560px, 94vw); margin: 60px auto; }
      .card { border: 1px solid var(--line); border-radius: 18px; background: rgba(255,255,255,0.95); box-shadow: 0 10px 32px rgba(16,40,73,0.09); padding: 32px; }
      .brand { display: inline-flex; align-items: baseline; font-family: "Space Grotesk", sans-serif; font-size: 1.8rem; font-weight: 700; margin: 0 0 6px; text-decoration: none; }
      .brand-hoa { color: #0f2f6d; } .brand-proxy { color: #1a66ff; }
      h2 { margin: 0 0 20px; font-family: "Space Grotesk", sans-serif; font-size: 1.15rem; }
      .verified { background: #e8f8ef; border: 2px solid #a3d5b5; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
      .verified-icon { font-size: 2rem; margin-bottom: 6px; }
      .row { display: flex; gap: 8px; margin: 8px 0; font-size: 0.92rem; }
      .row-label { font-weight: 700; color: var(--muted); min-width: 130px; }
      .row-val { color: var(--ink); }
      .hash-block { background: #f0f4fa; border-radius: 8px; padding: 10px 14px; font-family: monospace; font-size: 0.78rem; word-break: break-all; color: var(--muted); margin-top: 16px; }
      .not-found { background: #fff0f0; border: 2px solid #f0b4b4; border-radius: 12px; padding: 20px; color: var(--danger); }
      .loading { color: var(--muted); font-size: 0.95rem; padding: 20px 0; }
      .input-row { display: flex; gap: 8px; margin-bottom: 20px; }
      .input-row input { flex: 1; border: 1px solid var(--line); border-radius: 10px; padding: 10px 12px; font: inherit; }
      .input-row button { border: 1px solid var(--accent); background: var(--accent); color: #fff; border-radius: 10px; padding: 10px 18px; font: inherit; font-weight: 700; cursor: pointer; }
      .badge { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 0.78rem; font-weight: 700; background: #e8f8ef; color: #1f6f42; }
      .badge.revoked { background: #fce8e8; color: var(--danger); }
      .badge.expired { background: #f0f0f0; color: #666; }
    </style>
  </head>
  <body>
    <main class="shell">
      <div class="card">
        <a class="brand" href="/"><span class="brand-hoa">HOA</span><span class="brand-proxy">proxy</span></a>
        <h2>Verify Proxy Signature</h2>

        <div class="input-row">
          <input id="codeInput" type="text" placeholder="Enter verification code" maxlength="40" />
          <button type="button" onclick="verify()">Verify</button>
        </div>

        <div id="result"></div>

        <p style="font-size:0.82rem;color:var(--muted);margin-top:20px;line-height:1.5">
          This page allows board members to confirm that a printed proxy form was signed through HOAproxy
          and has not been altered. The verification code appears on the printed proxy form.
        </p>
      </div>
    </main>
    <script>
      const params = new URLSearchParams(window.location.search);
      const preCode = params.get("code");
      if (preCode) {
        document.getElementById("codeInput").value = preCode;
        document.addEventListener("DOMContentLoaded", verify);
      }

      function escHtml(t) {
        return String(t || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
      }

      function badgeClass(status) {
        return ["revoked","expired"].includes(status) ? "badge " + status : "badge";
      }

      async function verify() {
        const code = document.getElementById("codeInput").value.trim();
        const result = document.getElementById("result");
        if (!code) { result.innerHTML = '<div class="not-found">Please enter a verification code.</div>'; return; }
        result.innerHTML = '<div class="loading">Checking...</div>';
        try {
          const resp = await fetch("/proxies/verify/" + encodeURIComponent(code));
          if (resp.status === 404) {
            result.innerHTML = '<div class="not-found"><strong>Not found.</strong> This verification code does not match any proxy in our records. The form may have been altered or the code may be incorrect.</div>';
            return;
          }
          if (!resp.ok) throw new Error("Server error: " + resp.status);
          const p = await resp.json();
          const date = p.signed_at ? new Date(p.signed_at).toLocaleString() : "Unknown";
          result.innerHTML =
            '<div class="verified">' +
            '<div class="verified-icon">&#10003;</div>' +
            '<strong style="font-size:1.05rem">Proxy signature verified</strong>' +
            '</div>' +
            '<div class="row"><span class="row-label">HOA</span><span class="row-val">' + escHtml(p.hoa_name) + '</span></div>' +
            '<div class="row"><span class="row-label">Signed by</span><span class="row-val">' + escHtml(p.grantor_display) + '</span></div>' +
            '<div class="row"><span class="row-label">Delegate</span><span class="row-val">' + escHtml(p.delegate_name) + '</span></div>' +
            '<div class="row"><span class="row-label">Type</span><span class="row-val">General proxy</span></div>' +
            '<div class="row"><span class="row-label">Signed at</span><span class="row-val">' + escHtml(date) + '</span></div>' +
            '<div class="row"><span class="row-label">Status</span><span class="row-val"><span class="' + badgeClass(p.status) + '">' + escHtml(p.status) + '</span></span></div>' +
            (p.form_hash ? '<div class="hash-block"><strong>Document hash (SHA-256):</strong><br>' + escHtml(p.form_hash) + '</div>' : '');
        } catch (err) {
          result.innerHTML = '<div class="not-found">Error: ' + escHtml(err.message) + '</div>';
        }
      }

      document.getElementById("codeInput").addEventListener("keydown", e => {
        if (e.key === "Enter") verify();
      });
    </script>
  </body>
</html>
