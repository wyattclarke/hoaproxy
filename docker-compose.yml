version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  api:
    build: .
    depends_on:
      - qdrant
    ports:
      - "8000:8000"
    env_file:
      - settings.env
    volumes:
      - ./casnc_hoa_docs:/app/casnc_hoa_docs:ro
      - ./data:/app/data
      - ./settings.env:/app/settings.env:ro
    environment:
      - HOA_DOCS_ROOT=/app/casnc_hoa_docs
      - HOA_DB_PATH=/app/data/hoa_index.db
      - QDRANT_URL=http://qdrant:6333

volumes:
  qdrant_data:
